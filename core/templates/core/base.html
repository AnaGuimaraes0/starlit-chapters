{% load static %}
<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Starlit Chapters{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'estilo.css' %}">
</head>
<body>
    <nav class="navbar navbar-expand-lg bg-body-tertiary">
        <div class="container-fluid">
            <a class="navbar-brand" href="{% url 'index' %}">Starlit Chapters</a>
            <div class="navbar-nav">
                <a class="nav-link" href="{% url 'index' %}">Início</a>
                <a class="nav-link" href="{% url 'biblioteca' %}">Biblioteca</a>
                <a class="nav-link" href="{% url 'recomendacoes' %}">Recomendações</a>
                <a class="nav-link" href="{% url 'nao_recomendados' %}">Não Recomendados</a>
            </div>
        </div>
    </nav>

    {% block content %}{% endblock %}

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
