<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro - Starlit Chapters</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-900 text-gray-100 min-h-screen flex items-center justify-center">

    <div class="bg-slate-800 p-8 rounded-lg shadow-xl w-full max-w-md border border-slate-700">
        <h2 class="text-2xl font-bold text-center mb-2 text-indigo-400">Nova Leitora</h2>
        <p class="text-center text-gray-400 mb-8">Crie seu perfil e comece a registrar seus surtos</p>

        <form method="POST" action="">
            {% csrf_token %}
            
            <div class="space-y-4">
                {{ form.as_p }}
            </div>

            <button type="submit" class="w-full mt-6 bg-indigo-600 hover:bg-indigo-700 text-white font-semibold py-2 px-4 rounded-md transition duration-300">
                Criar Conta
            </button>
        </form>

        <p class="mt-6 text-center text-sm text-gray-400">
            Já possui um diário? 
            <a href="{% url 'login' %}" class="text-indigo-400 hover:text-indigo-300 font-medium">Faça login</a>
        </p>
    </div>

</body>
</html>
