<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Entrar - Starlit Chapters</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-900 text-gray-100 min-h-screen flex items-center justify-center">

    <div class="bg-slate-800 p-8 rounded-lg shadow-xl w-full max-w-md border border-slate-700">
        <h2 class="text-2xl font-bold text-center mb-6 text-indigo-400">Starlit Chapters</h2>
        <p class="text-center text-gray-400 mb-8">Acesse seu diário de leitura</p>

        <!-- O form aponta para vazio action="" para enviar os dados para a mesma URL que abriu a página -->
        <form method="POST" action="">
            <!-- TAG DE SEGURANÇA OBRIGATÓRIA -->
            {% csrf_token %}
            
            <div class="space-y-4">
                {{ form.as_p }}
            </div>

            <button type="submit" class="w-full mt-6 bg-indigo-600 hover:bg-indigo-700 text-white font-semibold py-2 px-4 rounded-md transition duration-300">
                Entrar no Acervo
            </button>
        </form>

        <p class="mt-6 text-center text-sm text-gray-400">
            Ainda não tem uma conta? 
            <a href="{% url 'cadastro' %}" class="text-indigo-400 hover:text-indigo-300 font-medium">Cadastre-se</a>
        </p>
    </div>

</body>
</html>
